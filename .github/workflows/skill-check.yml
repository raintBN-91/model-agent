name: SKILL.md Reference Check

on:
  pull_request:
    paths:
      - 'skills/**/SKILL.md'
  push:
    branches: [master]
    paths:
      - 'skills/**/SKILL.md'

jobs:
  check-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check SKILL.md references
        run: |
          python tools/check_skill_refs.py
      - name: Check YAML frontmatter
        run: |
          python -c "
          import os, sys
          skills_dir = 'skills'
          errors = 0
          for dirpath, _, filenames in os.walk(skills_dir):
              for f in filenames:
                  if f == 'SKILL.md':
                      filepath = os.path.join(dirpath, f)
                      with open(filepath, 'r', encoding='utf-8', errors='ignore') as fh:
                          content = fh.read()
                      if not content.startswith('---'):
                          print(f'MISSING frontmatter: {filepath}')
                          errors += 1
          if errors:
              print(f'{errors} SKILL.md missing frontmatter')
              sys.exit(1)
          print('All SKILL.md have frontmatter')
          "
