# path_config.yaml：仓库所有核心目录绝对路径配置
# 说明：请根据自己的Linux仓库实际路径修改root_path，其余路径会自动关联
root_path: "/data/predict-agent"  # 仓库根目录绝对路径（核心，必改）

# 脚本目录路径（scripts下所有子目录）
scripts:
  base_path: "${root_path}/scripts"          # 脚本根目录
  common: "${scripts.base_path}/common"      # 公共工具脚本目录
  data_process: "${scripts.base_path}/data_process" # 数据处理脚本目录
  evaluate: "${scripts.base_path}/evaluate" # 模型评测脚本目录
  train: "${scripts.base_path}/train"       # 模型训练脚本目录
  infer: "${scripts.base_path}/infer"       # 模型推理目录

# 智能体skills目录路径
skills:
  base_path: "${root_path}/skills"     # skill根目录

# 其他核心目录路径
logs_path: "${root_path}/logs"               # 日志目录
temp_path: "${root_path}/temp"               # 临时文件目录
config_path: "${root_path}/config"           # 配置文件自身目录（可用于引用其他配置文件）