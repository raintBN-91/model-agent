[project]
name = "my-project"
version = "0.1.0"
description = "Project with Ascend NPU and CUDA support"
requires-python = ">=3.10"
dependencies = ["transformers", "accelerate"]

[project.optional-dependencies]
cuda = ["torch>=2.6.0", "torchaudio>=2.6.0"]
ascend = ["torch>=2.6.0", "torch-npu>=2.6.0"]

[tool.uv]
index-strategy = "unsafe-best-match"
conflicts = [[{ extra = "cuda" }, { extra = "ascend" }]]

[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[[tool.uv.index]]
name = "ascend-repo"
url = "https://repo.huaweicloud.com/repository/pypi/simple"
explicit = true

[tool.uv.sources]
torch = [
    { index = "pytorch-cu124", extra = "cuda" },
    { index = "ascend-repo", extra = "ascend" },
]
torchaudio = [{ index = "pytorch-cu124", extra = "cuda" }]
torch-npu = [{ index = "ascend-repo", extra = "ascend" }]

[tool.ruff]
exclude = [".history"]

[tool.pyright]
exclude = [".history"]
venvPath = "."
venv = ".venv"

[tool.mypy]
exclude = ["\\.history"]

[tool.ty.src]
exclude = [".history"]
